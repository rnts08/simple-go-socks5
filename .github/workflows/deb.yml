name: Build .deb Package

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dh-make debhelper devscripts build-essential golang-go

      - name: Build the package
        run: |
          export DEBEMAIL="release@example.com"
          export EMAIL="release@example.com"
          export DEBFULLNAME="Go Socks5 Release"
          
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "$VERSION" > VERSION
          dch --newversion "$VERSION-1" --distribution stable "Release $VERSION"
          dpkg-buildpackage -us -uc -d

      - name: Find .deb file
        run: |
          FILENAME=$(ls ../go-socks5_*_amd64.deb)
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
        id: find

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-socks5_amd64
          path: ${{ steps.find.outputs.filename }}

  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dh-make debhelper devscripts build-essential golang-go gcc-aarch64-linux-gnu

      - name: Build the package
        run: |
          export DEBEMAIL="release@example.com"
          export EMAIL="release@example.com"
          export DEBFULLNAME="Go Socks5 Release"
          export GOOS=linux
          export GOARCH=arm64
          export CC=aarch64-linux-gnu-gcc
          
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "$VERSION" > VERSION
          dch --newversion "$VERSION-1" --distribution stable "Release $VERSION"
          
          # Build with cross-compiler
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 dpkg-buildpackage -us -uc -d

      - name: Find .deb file
        run: |
          FILENAME=$(ls ../go-socks5_*_arm64.deb)
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
        id: find

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-socks5_arm64
          path: ${{ steps.find.outputs.filename }}

  release:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: go-socks5_amd64
          path: amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: go-socks5_arm64
          path: arm64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            amd64/*.deb
            arm64/*.deb
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}