name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Go binary for amd64
        run: |
          docker build --build-arg GOARCH=amd64 --platform linux/amd64 -t go-socks5:amd64 .

      - name: Build Go binary for arm64
        run: |
          docker build --build-arg GOARCH=arm64 --platform linux/arm64 -t go-socks5:arm64 .

      - name: Extract amd64 binary
        run: |
          docker create --name go-socks5-amd64 go-socks5:amd64
          docker cp go-socks5-amd64:/go/bin/go-socks5 ./go-socks5-linux-amd64
          docker rm go-socks5-amd64
          chmod +x go-socks5-linux-amd64

      - name: Extract arm64 binary
        run: |
          docker create --name go-socks5-arm64 go-socks5:arm64
          docker cp go-socks5-arm64:/go/bin/go-socks5 ./go-socks5-linux-arm64
          docker rm go-socks5-arm64
          chmod +x go-socks5-linux-arm64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            go-socks5-linux-amd64
            go-socks5-linux-arm64
          draft: false
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}