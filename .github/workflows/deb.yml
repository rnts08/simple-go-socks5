name: Build .deb Package

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dh-make debhelper devscripts build-essential

      - name: Build the package
        run: |
          export DEBEMAIL="release@example.com"
          export EMAIL="release@example.com"
          export DEBFULLNAME="Go Socks5 Release"
          
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "$VERSION" > VERSION
          dch --newversion "$VERSION-1" --distribution stable "Release $VERSION"
          dpkg-buildpackage -us -uc -d

      - name: Find .deb file
        run: |
          FILENAME=$(ls ../go-socks5_*.deb)
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
        id: find

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.find.outputs.filename }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}