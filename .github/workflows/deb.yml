name: Build .deb Packages

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper

      - name: Build amd64 binary
        run: |
          GOARCH=amd64 CGO_ENABLED=0 go build -o debian/go-socks5 .

      - name: Build arm64 binary  
        run: |
          GOARCH=arm64 CGO_ENABLED=0 go build -o debian/go-socks5-arm64 .

      - name: Create amd64 package
        run: |
          cd debian
          dpkg-deb --build --arch=amd64 . ../go-socks5_amd64.deb

      - name: Create arm64 package
        run: |
          cd debian
          mv go-socks5-arm64 go-socks5
          dpkg-deb --build --arch=arm64 . ../go-socks5_arm64.deb

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            go-socks5_amd64.deb
            go-socks5_arm64.deb
          draft: false
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}