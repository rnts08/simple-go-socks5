name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build amd64
        run: |
          GOARCH=amd64 CGO_ENABLED=0 go build -o go-socks5-linux-amd64 .

      - name: Build arm64
        run: |
          GOARCH=arm64 CGO_ENABLED=0 go build -o go-socks5-linux-arm64 .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            go-socks5-linux-amd64
            go-socks5-linux-arm64
          draft: false
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}